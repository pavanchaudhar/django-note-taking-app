<!DOCTYPE html>
<html>
<head>
    <title>All Notes</title>
</head>
<body>

<h1>All Notes</h1>

<a href="/">🏠 Home</a> |
<a href="/add/">➕ Add Note</a>

<hr>

{% for note in notes %}

<h2>{{ note.title }}</h2>

<p>{{ note.content }}</p>

<small>
Created: {{ note.created_at }}
</small>

<hr>

{% empty %}

<h3>No Notes Found</h3>

{% endfor %}

</body>
</html>
